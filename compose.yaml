services:
  smoke:
    build: .
    network_mode: none
    cap_drop:
      - ALL
    command:
      - run
      - --task
      - text-normalization-001
      - --action
      - correct
      - --seed
      - "42"
      - --output
      - /tmp/agentenv-forge/trajectory.jsonl
    read_only: true
    tmpfs:
      - /tmp:size=16m
    security_opt:
      - no-new-privileges:true
